name: RoamWise Agent — Daily Ops
on:
  schedule:
    - cron: '30 3 * * *'   # 09:00 IST every day
  workflow_dispatch:        # manual "Run now" button

permissions:
  contents: read
  issues: write

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      MAILU: ${{ secrets.MAIL_USERNAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install deps
        run: npm init -y >/dev/null 2>&1 && npm i firebase-admin@12 --no-audit --no-fund >/dev/null 2>&1 || true
      - name: Run daily agent
        id: agent
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node agent/daily.js
      - name: Post report as GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report.md','utf8');
            const down = fs.existsSync('DOWN');
            const d = new Date().toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata',day:'numeric',month:'short'});
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: (down?'🔴 SITE DOWN — ':'🥷 Daily report — ') + d,
              body, labels: ['agent-report']
            });
      - name: Email report (if mail secrets are set)
        if: env.MAILU != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          subject: "🥷 RoamWise daily report"
          to: ${{ secrets.TO_EMAIL }}
          from: RoamWise Agent
          body: file://report.md
